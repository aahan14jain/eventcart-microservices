name: Kubernetes — Build & Deploy to Kind

on:
  push:
    branches: [main, master]
    paths:
      - 'EventCart/services/**'
      - 'k8s/**'
      - 'scripts/**'
      - '.github/workflows/kubernetes.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'EventCart/services/**'
      - 'k8s/**'
      - 'scripts/**'
      - '.github/workflows/kubernetes.yml'
  workflow_dispatch:

env:
  CLUSTER_NAME: eventcart-ci
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          config: k8s/kind/cluster-config.yaml
          wait: 120s

      - name: Install NGINX Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s

      - name: Build microservice Docker images
        run: |
          set -euo pipefail
          for svc in order-service inventory-service payment-service notification-service; do
            docker build \
              -t "eventcart/${svc}:${IMAGE_TAG}" \
              -t "eventcart/${svc}:latest" \
              "EventCart/services/${svc}"
          done

      - name: Load images into Kind
        run: |
          set -euo pipefail
          for svc in order-service inventory-service payment-service notification-service; do
            kind load docker-image "eventcart/${svc}:${IMAGE_TAG}" --name "${CLUSTER_NAME}"
            kind load docker-image "eventcart/${svc}:latest" --name "${CLUSTER_NAME}"
          done

      - name: Deploy EventCart stack
        run: |
          chmod +x scripts/k8s/deploy.sh
          CLUSTER_NAME="${CLUSTER_NAME}" IMAGE_TAG="${IMAGE_TAG}" SKIP_BUILD=true bash scripts/k8s/deploy.sh

      - name: Verify deployments are healthy
        run: |
          kubectl get pods -n eventcart -o wide
          kubectl wait --namespace eventcart \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/part-of=eventcart \
            --timeout=600s

      - name: Smoke test Order API via port-forward
        run: |
          kubectl port-forward -n eventcart svc/order-service 18080:8080 &
          sleep 5
          curl -sf http://localhost:18080/actuator/health | grep -q '"status":"UP"'
          curl -sf -X POST http://localhost:18080/orders \
            -H 'Content-Type: application/json' \
            -d '{"items":[{"sku":"SKU-001","quantity":1}],"totalAmount":29.99}' | grep -q 'orderId'

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          kubectl get all -n eventcart
          kubectl describe pods -n eventcart
          kubectl logs -n eventcart -l app.kubernetes.io/name=order-service --tail=100 || true
