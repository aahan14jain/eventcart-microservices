apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: eventcart
  labels:
    app.kubernetes.io/name: kafka-topics-init
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: eventcart
  annotations:
    # Run after Helm install; safe to re-apply (idempotent topic create)
    helm.sh/hook-weight: "5"
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-topics-init
        app.kubernetes.io/part-of: eventcart
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka broker at eventcart-kafka:9092..."
              until nc -z eventcart-kafka 9092; do
                echo "Kafka not ready, sleeping 5s..."
                sleep 5
              done
              echo "Kafka is reachable."
      containers:
        - name: create-topics
          image: bitnami/kafka:3.9.0-debian-12-r8
          command:
            - /bin/bash
            - -ec
            - |
              BOOTSTRAP="eventcart-kafka:9092"
              PARTITIONS=3
              RF=1

              create_topic() {
                local topic="$1"
                local partitions="${2:-$PARTITIONS}"
                local rf="${3:-$RF}"
                if /opt/bitnami/kafka/bin/kafka-topics.sh \
                  --bootstrap-server "$BOOTSTRAP" \
                  --list | grep -qx "$topic"; then
                  echo "Topic $topic already exists — skipping."
                else
                  echo "Creating topic $topic (partitions=$partitions, rf=$rf)..."
                  /opt/bitnami/kafka/bin/kafka-topics.sh \
                    --bootstrap-server "$BOOTSTRAP" \
                    --create \
                    --topic "$topic" \
                    --partitions "$partitions" \
                    --replication-factor "$rf" \
                    --if-not-exists
                fi
              }

              # Saga choreography topics
              create_topic order.created
              create_topic inventory.reserved
              create_topic inventory.failed
              create_topic inventory.released 3 1
              create_topic payment.succeeded
              create_topic payment.failed

              # Dead-letter topics for order-service saga consumers
              create_topic inventory.reserved.DLT
              create_topic inventory.failed.DLT
              create_topic payment.succeeded.DLT
              create_topic payment.failed.DLT

              echo "All EventCart topics provisioned."
              /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server "$BOOTSTRAP" --list
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
