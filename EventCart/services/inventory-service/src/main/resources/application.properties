spring.application.name=inventory-service
# Human-readable logs locally (logback-spring.xml). K8s/prod overrides via SPRING_PROFILES_ACTIVE.
spring.profiles.default=local
server.port=8081
spring.kafka.bootstrap-servers=localhost:29092
# inventory.released: declared at startup (KafkaTopicConfig) — no consumer in this app, so topic is ensured before compensation publish
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Logical DB for idempotency keys (order-service uses default 0) — avoids key collisions on shared Redis
spring.data.redis.database=1
event.idempotency.ttl-hours=24
# Actuator: local/demo — restrict exposure in production (e.g. separate management port + auth).
# prometheus = Prometheus text exposition at /actuator/prometheus (Micrometer; scrape from a local Prometheus if desired).
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Show Redis/Kafka/etc. in /actuator/health for local demos; prefer when_authorized in production.
management.endpoint.health.show-details=always
# /actuator/info — custom app block; version and artifact come from Maven build-info (see pom).
management.info.defaults.enabled=true
management.info.build.enabled=true
info.app.name=${spring.application.name}
info.app.title=EventCart Inventory Service
info.app.description=Inventory saga consumer (local demo)
# Console pattern used by local/dev profile (logback-spring.xml). Prod/K8s use JSON LogstashEncoder.
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%thread] [%X{traceId:-}] %logger{36} - %msg%n
