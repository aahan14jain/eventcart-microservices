spring.config.activate.on-profile=postgres

# Enable DB/JPA auto-config when postgres profile is active (default profile excludes it).
spring.autoconfigure.exclude=

# Connection (override via env without editing)
# Supports both standard Spring env vars (SPRING_DATASOURCE_*) and service-specific ones (ORDER_DB_*).
spring.datasource.url=${ORDER_DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventcart_orders}}
spring.datasource.username=${ORDER_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:eventcart}}
spring.datasource.password=${ORDER_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:eventcart}}

# HikariCP — Micrometer auto-binds hikaricp_connections_* for Prometheus/CloudWatch during load tests
spring.datasource.hikari.pool-name=order-service-pool
spring.datasource.hikari.maximum-pool-size=${ORDER_DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${ORDER_DB_POOL_MIN:5}
spring.datasource.hikari.register-mbeans=true

# JPA (demo-friendly for now; we'll tighten this later)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.sql.init.mode=never
