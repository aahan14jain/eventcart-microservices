spring.application.name=order-service
# Human-readable logs locally (logback-spring.xml). K8s/prod overrides via SPRING_PROFILES_ACTIVE (e.g. postgres).
spring.profiles.default=local
# Comma-separated explicit origins (no wildcard). Override in prod, e.g. CORS_ALLOWED_ORIGINS=https://app.example.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
# Default 8080. Override without editing: SERVER_PORT=8095 ./mvnw spring-boot:run
server.port=${SERVER_PORT:8080}

# Phase 5 foundation:
# Keep existing in-memory OrderStore behavior by default. When you're ready to run with PostgreSQL,
# start with: --spring.profiles.active=postgres (see application-postgres.properties).
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

spring.kafka.bootstrap-servers=localhost:29092
spring.data.redis.host=localhost
spring.data.redis.port=6379
event.idempotency.ttl-hours=24
# GET /orders/{orderId}: first read = cache miss (load OrderStore + repopulate Redis), repeat = hit until TTL.
# For a faster live demo (miss → hit → miss after expiry), use profile "demo" (see README).
order.cache.ttl-seconds=60
# Actuator — local demo (tighten in production: fewer endpoints, when_authorized health, auth on management).
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
# Default is /actuator; set explicitly so paths are obvious for demos and scrapers.
management.endpoints.web.base-path=/actuator
# /actuator/info — custom app block; version and artifact come from Maven build-info (see pom).
management.info.defaults.enabled=true
management.info.build.enabled=true
info.app.name=${spring.application.name}
info.app.title=EventCart Order Service
info.app.description=Order API and saga events (local demo)
server.error.include-message=always
server.error.include-stacktrace=always
# Console pattern used by local/dev profile (logback-spring.xml). Prod/K8s use JSON LogstashEncoder.
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%thread] [%X{traceId:-}] %logger{36} - %msg%n

# Internal admin API (/admin/**) — distinct from customer /orders. Override in prod.
admin.security.username=${ADMIN_USERNAME:admin}
admin.security.password=${ADMIN_PASSWORD:admin-change-me}
admin.security.api-key=${ADMIN_API_KEY:eventcart-admin-key-change-me}
