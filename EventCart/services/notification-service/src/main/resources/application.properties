spring.application.name=notification-service
# Human-readable logs locally (logback-spring.xml). K8s/prod overrides via SPRING_PROFILES_ACTIVE.
spring.profiles.default=local
server.port=8083
spring.kafka.bootstrap-servers=localhost:29092
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true
# Console pattern used by local/dev profile (logback-spring.xml). Prod/K8s use JSON LogstashEncoder.
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%thread] [%X{traceId:-}] %logger{36} - %msg%n
